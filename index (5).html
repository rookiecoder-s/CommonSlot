<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CommonSlot — find when everyone can meet</title>

<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf8f4;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── Layout ── */
.wrap{
  width:100%;
  max-width:620px;
  margin:0 auto;
  padding:clamp(.75rem,4vw,1.5rem) clamp(.75rem,4vw,1rem) clamp(2rem,6vw,3rem);
}
.hero{text-align:center;margin-bottom:clamp(1.25rem,4vw,2rem);padding:clamp(1rem,4vw,2rem) 1rem clamp(.75rem,3vw,1.5rem)}
.wordmark{font-size:clamp(24px,6vw,32px);font-weight:600;letter-spacing:-1px;color:#1a1a1a}
.wordmark span{color:#BA7517}
.tagline{font-size:clamp(12px,3vw,14px);color:#777;margin-top:6px;line-height:1.5}

/* ── Cards ── */
.card{background:#fff;border:1px solid #e8e2d8;border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,4vw,1.5rem);margin-bottom:1rem}
.pill-label{display:inline-flex;align-items:center;gap:5px;font-size:clamp(10px,2.5vw,11px);font-weight:600;background:#FAEEDA;color:#633806;border-radius:20px;padding:3px 10px;letter-spacing:.4px;margin-bottom:1rem;text-transform:uppercase}
.participants{display:flex;flex-direction:column;gap:10px;margin-bottom:1rem}

/* ── Participant rows ── */
.p-row{display:flex;align-items:center;gap:8px;width:100%;min-width:0}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.p-row input{flex:1;min-width:0;font-size:clamp(13px,3.5vw,15px);padding:9px 12px;border-radius:12px;border:1.5px solid #d6cfc3;background:#f9f6f1;color:#1a1a1a;outline:none;font-family:inherit;width:100%}
.p-row input:focus{border-color:#BA7517;background:#fff}
.p-row input::placeholder{color:#bbb}
.p-name{width:clamp(80px,22vw,110px);min-width:0;font-size:clamp(12px,3vw,14px);padding:9px 10px;border-radius:12px;border:1.5px solid #d6cfc3;background:#f9f6f1;color:#1a1a1a;outline:none;font-family:inherit;flex-shrink:0}
.p-name:focus{border-color:#BA7517;background:#fff}
.p-name::placeholder{color:#bbb;font-style:italic}
.rm{width:30px;height:30px;min-width:30px;border-radius:50%;border:1.5px solid #d6cfc3;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;flex-shrink:0;font-size:16px;line-height:1;font-family:inherit;-webkit-tap-highlight-color:transparent}
.rm:hover{color:#1a1a1a;border-color:#999}

/* ── Add row / Duration ── */
.add-row{display:flex;align-items:center;gap:8px;font-size:clamp(12px,3vw,13px);color:#888;background:transparent;border:1.5px dashed #d6cfc3;border-radius:12px;padding:8px 14px;cursor:pointer;width:100%;margin-bottom:1rem;font-family:inherit;-webkit-tap-highlight-color:transparent}
.add-row:hover{color:#BA7517;border-color:#BA7517}
.dur-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap}
.dur-label{font-size:clamp(12px,3vw,13px);color:#888;white-space:nowrap}
.dur-select{font-size:clamp(12px,3vw,13px);padding:7px 12px;border-radius:10px;border:1.5px solid #d6cfc3;background:#f9f6f1;color:#1a1a1a;font-family:inherit;outline:none;cursor:pointer;max-width:100%}
.dur-select:focus{border-color:#BA7517}

/* ── Buttons ── */
.go{width:100%;padding:clamp(11px,3vw,13px);font-size:clamp(14px,3.5vw,15px);font-weight:600;background:#BA7517;color:#fff;border:none;border-radius:14px;cursor:pointer;font-family:inherit;margin-bottom:.75rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.go:hover{background:#854F0B}
.go:active{transform:scale(.99)}
.go:disabled{opacity:.6;cursor:not-allowed;transform:none}
.hint{font-size:clamp(11px,2.5vw,12px);color:#aaa;text-align:center;line-height:1.6}
.hint code{background:#f0ece6;padding:1px 5px;border-radius:4px;font-size:clamp(10px,2.5vw,11px);color:#666}
.count-badge{font-size:12px;color:#aaa;margin-left:auto;padding-right:2px}

/* ── Timezone picker ── */
.slot-wrap{flex:1;min-width:0;position:relative;display:flex;align-items:center;gap:6px}
.slot-wrap input{flex:1;min-width:0}
.tz-btn{width:34px;height:34px;min-width:34px;border-radius:9px;border:1.5px solid #d6cfc3;background:#f9f6f1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent}
.tz-btn:hover{border-color:#BA7517;background:#fff}
.tz-dropdown{position:absolute;z-index:9999;top:calc(100% + 6px);right:0;width:min(300px,calc(100vw - 2rem));background:#fff;border:1.5px solid #e8e2d8;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.13);overflow:hidden}
.tz-search-wrap{padding:10px 12px;border-bottom:1px solid #f0ece6;background:#fdfaf5}
.tz-search{width:100%;font-size:14px;padding:7px 11px;border-radius:9px;border:1.5px solid #d6cfc3;outline:none;font-family:inherit;background:#fff;color:#1a1a1a}
.tz-search:focus{border-color:#BA7517}
.tz-search::placeholder{color:#bbb}
.tz-list{max-height:min(240px,40vh);overflow-y:auto;-webkit-overflow-scrolling:touch}
.tz-group-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#bbb;padding:8px 13px 4px;background:#fdfaf5;position:sticky;top:0}
.tz-item{padding:10px 13px;font-size:clamp(12px,3vw,13px);cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f9f6f1;-webkit-tap-highlight-color:transparent}
.tz-item:last-child{border-bottom:none}
.tz-item:hover,.tz-item:active{background:#FAEEDA}
.tz-item-left{display:flex;flex-direction:column;gap:1px}
.tz-item-city{font-weight:500;color:#1a1a1a}
.tz-item-country{font-size:11px;color:#aaa}
.tz-item-right{text-align:right;flex-shrink:0;margin-left:8px}
.tz-item-abbr{font-size:12px;font-weight:600;color:#BA7517}
.tz-item-offset{font-size:11px;color:#bbb;font-family:monospace}
.tz-empty{padding:14px 13px;font-size:13px;color:#aaa;text-align:center}

/* ── Share panel ── */
.share-panel{background:#fff;border:1px solid #e8e2d8;border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,4vw,1.25rem) clamp(1rem,4vw,1.5rem);margin-bottom:1rem}
.share-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:.25rem}
.share-sub{font-size:12px;color:#888;margin-bottom:.75rem;line-height:1.5}
.share-link-row{display:flex;gap:8px;align-items:stretch}
.share-link-box{flex:1;min-width:0;font-size:clamp(10px,2.5vw,12px);padding:8px 10px;border-radius:10px;border:1.5px solid #d6cfc3;background:#f9f6f1;color:#666;font-family:monospace;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.share-copy{font-size:clamp(12px,3vw,13px);font-weight:600;padding:8px clamp(10px,3vw,16px);border-radius:10px;border:none;background:#BA7517;color:#fff;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.share-copy:hover{background:#854F0B}

/* ── Status list ── */
.status-list{display:flex;flex-direction:column;gap:6px;margin-top:.75rem}
.status-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;background:#faf8f4;min-width:0}
.status-name{flex:1;min-width:0;font-size:clamp(12px,3vw,13px);font-weight:500;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-slot{font-size:clamp(10px,2.5vw,12px);color:#888;font-family:monospace;flex-shrink:0;white-space:nowrap}
.s-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.s-wait{background:#f0ece6;color:#aaa}
.s-done{background:#E1F5EE;color:#085041}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#1D9E75;margin-right:4px;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Result ── */
.result{margin-top:0}
.res-card{background:#fff;border:1px solid #e8e2d8;border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,4vw,1.5rem)}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:clamp(11px,2.5vw,12px);font-weight:600;padding:4px 12px;border-radius:20px}
.b-ok{background:#E1F5EE;color:#085041}
.b-comp{background:#FAEEDA;color:#633806}
.big-time{font-size:clamp(22px,5.5vw,30px);font-weight:600;letter-spacing:-1px;margin:.6rem 0 .2rem;color:#1a1a1a;word-break:break-word}
.sub-time{font-size:clamp(11px,2.5vw,13px);color:#888;margin-bottom:1.25rem}
.divider{height:1px;background:#f0ece6;margin:1.25rem 0}
.sec-title{font-size:11px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.75rem}
.no-overlap-notice{background:#FAEEDA;border-radius:10px;padding:10px 14px;margin:.5rem 0 1rem;font-size:clamp(12px,3vw,13px);color:#633806;line-height:1.7}
.suggest-box{background:#FAEEDA;border:1.5px solid #EF9F27;border-radius:16px;padding:clamp(1rem,4vw,1.25rem) clamp(1rem,4vw,1.5rem)}
.suggest-eyebrow{font-size:11px;font-weight:600;color:#854F0B;text-transform:uppercase;letter-spacing:.6px;margin-bottom:.5rem}
.suggest-time{font-size:clamp(18px,5vw,26px);font-weight:600;letter-spacing:-.5px;color:#412402;margin-bottom:.25rem;word-break:break-word}
.suggest-utc{font-size:clamp(11px,2.5vw,13px);color:#854F0B;margin-bottom:1rem}
.suggest-list{display:flex;flex-direction:column;gap:6px}
.suggest-row{display:flex;align-items:center;gap:8px;background:#fff8ee;border-radius:10px;padding:8px 10px;min-width:0;flex-wrap:wrap}
.suggest-name{font-size:clamp(12px,3vw,13px);font-weight:600;color:#412402;min-width:60px}
.suggest-tz{font-size:clamp(11px,2.5vw,12px);color:#854F0B;margin-right:2px}
.suggest-local{font-size:clamp(11px,2.5vw,13px);color:#633806;margin-left:auto;white-space:nowrap}
.pp-list{display:flex;flex-direction:column;gap:8px}
.pp{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:14px;background:#faf8f4;min-width:0;flex-wrap:wrap}
.pp-label{flex:1;min-width:0;font-size:clamp(12px,3vw,14px);font-weight:600;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pp-t{font-size:clamp(11px,2.5vw,13px);color:#666;white-space:nowrap}
.st{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.s-ok{background:#E1F5EE;color:#085041}
.s-warn{background:#FAEEDA;color:#633806}
.fair-track{height:6px;border-radius:3px;background:#ece7df;overflow:hidden;margin:.4rem 0 .3rem}
.fair-fill{height:100%;border-radius:3px;background:#EF9F27}
.fair-meta{display:flex;justify-content:space-between;font-size:11px;color:#aaa}
.copy-btn{display:flex;align-items:center;gap:6px;font-size:clamp(12px,3vw,13px);color:#888;background:#fff;border:1.5px solid #d6cfc3;border-radius:10px;padding:7px 14px;cursor:pointer;margin-top:1rem;font-family:inherit;-webkit-tap-highlight-color:transparent}
.copy-btn:hover{color:#1a1a1a;border-color:#999}
.err-msg{font-size:clamp(12px,3vw,13px);color:#c0392b;line-height:1.8}

/* ── Participant view ── */
.invite-banner{background:#FAEEDA;border:1.5px solid #EFC97A;border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,4vw,1.5rem);margin-bottom:1rem}
.invite-from{font-size:12px;color:#BA7517;font-weight:500;margin-bottom:5px}
.invite-greeting{font-size:clamp(18px,5vw,22px);font-weight:600;color:#412402;margin-bottom:4px;letter-spacing:-.3px}
.invite-msg{font-size:clamp(12px,3vw,13px);color:#854F0B}
.field-label{display:block;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#aaa;margin-bottom:5px}
.field-input{width:100%;font-size:clamp(13px,3.5vw,15px);padding:10px 13px;border-radius:12px;border:1.5px solid #d6cfc3;background:#f9f6f1;color:#1a1a1a;font-family:monospace;outline:none;transition:border-color .15s;margin-bottom:1rem}
.field-input:focus{border-color:#BA7517;background:#fff}
.field-input::placeholder{color:#bbb;font-family:system-ui}
.success-box{background:#E1F5EE;border:1.5px solid #8ED4B4;border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,4vw,1.25rem) clamp(1rem,4vw,1.5rem)}
.success-title{font-size:clamp(14px,3.5vw,16px);font-weight:600;color:#085041;margin-bottom:.3rem}
.success-msg{font-size:clamp(12px,3vw,13px);color:#2D6B4A;line-height:1.6}
.success-slot{font-family:monospace;font-size:clamp(12px,3vw,14px);background:rgba(255,255,255,.6);border-radius:8px;padding:8px 12px;margin-top:.75rem;color:#085041;font-weight:500;word-break:break-all}
.others-list{display:flex;flex-direction:column;gap:6px}
.others-row{display:flex;align-items:center;gap:8px;padding:7px 11px;border-radius:9px;background:#faf8f4;min-width:0}
.others-name{flex:1;min-width:0;font-size:clamp(12px,3vw,13px);font-weight:500;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.others-tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;flex-shrink:0}
.ot-you{background:#FAEEDA;color:#BA7517}
.ot-done{background:#E1F5EE;color:#085041}
.ot-wait{background:#f0ece6;color:#aaa}

/* ── Join view ── */
.join-banner{background:linear-gradient(135deg,#FAEEDA 0%,#fff8ee 100%);border:1.5px solid #EFC97A;border-radius:clamp(14px,3vw,20px);padding:clamp(1.25rem,4vw,1.75rem) clamp(1rem,4vw,1.5rem);margin-bottom:1rem;text-align:center}
.join-icon{font-size:clamp(28px,7vw,36px);margin-bottom:.5rem}
.join-title{font-size:clamp(18px,5vw,22px);font-weight:600;color:#412402;letter-spacing:-.3px;margin-bottom:.35rem}
.join-sub{font-size:clamp(12px,3vw,13px);color:#854F0B;line-height:1.6}
.join-who{margin-top:.75rem;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.join-who-pill{font-size:clamp(11px,2.5vw,12px);font-weight:500;background:#fff;border:1px solid #EFC97A;color:#633806;border-radius:20px;padding:3px 10px}
.join-dur{font-size:12px;color:#aaa;margin-top:.6rem}

/* ── Session History ── */
.hist-section{margin-bottom:1rem}
.hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem}
.hist-title{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:#aaa}
.hist-clear{font-size:11px;color:#ccc;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:2px 6px;border-radius:6px}
.hist-clear:hover{color:#999}
.hist-list{display:flex;flex-direction:column;gap:6px}
.hist-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;background:#fff;border:1.5px solid #e8e2d8;cursor:pointer;transition:border-color .15s;-webkit-tap-highlight-color:transparent}
.hist-item:hover{border-color:#BA7517}
.hist-dot{width:8px;height:8px;border-radius:50%;background:#BA7517;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-name{font-size:clamp(12px,3vw,13px);font-weight:500;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-meta{font-size:11px;color:#aaa;margin-top:1px}
.hist-arrow{font-size:14px;color:#ccc;flex-shrink:0}
.new-meeting-btn{width:100%;padding:clamp(10px,3vw,12px);font-size:clamp(13px,3.5vw,14px);font-weight:600;background:#fff;color:#BA7517;border:2px solid #BA7517;border-radius:14px;cursor:pointer;font-family:inherit;margin-bottom:.75rem;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s}
.new-meeting-btn:hover{background:#BA7517;color:#fff}
.new-meeting-btn:active{transform:scale(.99)}

/* ── How to use ── */
.how-card{background:#fdfaf5;border:1.5px dashed #d6cfc3;border-radius:clamp(14px,3vw,20px);padding:clamp(1rem,4vw,1.25rem) clamp(1rem,4vw,1.5rem);margin-bottom:1rem}
.how-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent;background:none;border:none;width:100%;padding:0;font-family:inherit}
.how-toggle-label{font-size:clamp(12px,3vw,13px);font-weight:600;color:#854F0B;display:flex;align-items:center;gap:6px}
.how-toggle-arrow{font-size:14px;color:#ccc;transition:transform .2s}
.how-toggle-arrow.open{transform:rotate(180deg)}
.how-body{display:none;margin-top:.85rem;border-top:1px solid #e8e2d8;padding-top:.85rem}
.how-body.open{display:block}
.how-step{display:flex;gap:10px;margin-bottom:.75rem;align-items:flex-start}
.how-step:last-child{margin-bottom:0}
.how-num{width:22px;height:22px;min-width:22px;border-radius:50%;background:#BA7517;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.how-text{font-size:clamp(12px,3vw,13px);color:#633806;line-height:1.6}
.how-text strong{color:#412402}

/* ── Narrow phones (≤380px) ── */
@media(max-width:380px){
  .wrap{padding:.65rem .65rem 2.5rem}
  .card{padding:.85rem}
  .p-row{flex-wrap:wrap}
  .p-name{width:100%}
  .slot-wrap{width:100%}
  .rm{margin-left:auto}
  .share-link-row{flex-direction:column}
  .share-copy{width:100%;text-align:center;padding:10px}
  .suggest-row{flex-wrap:wrap}
  .suggest-local{margin-left:0;width:100%}
  .pp{flex-wrap:wrap}
  .pp-t{width:100%}
}

/* ── Standard mobile (381–540px) ── */
@media(min-width:381px) and (max-width:540px){
  .p-row{flex-wrap:wrap;gap:6px}
  .p-name{width:100%;flex-shrink:0}
  .slot-wrap{flex:1;min-width:0}
  .rm{flex-shrink:0}
}

/* ── Tablet portrait (541–768px) ── */
@media(min-width:541px) and (max-width:768px){
  .wrap{padding:1.25rem 1.5rem 3rem}
  .p-name{width:clamp(90px,20vw,110px)}
  .tz-dropdown{width:280px}
}

/* ── Tablet landscape / small laptop (769–1024px) ── */
@media(min-width:769px) and (max-width:1024px){
  .wrap{padding:1.5rem 2rem 3rem}
}

/* ── Large desktop (1025px+) ── */
@media(min-width:1025px){
  .wrap{padding:2rem 1rem 4rem}
}

/* ── Touch device tap targets ── */
@media(hover:none) and (pointer:coarse){
  .go,.share-copy,.add-row,.rm,.tz-btn,.tz-item{min-height:44px}
  .tz-item{padding:12px 13px}
  .go{padding:15px}
  input,select{font-size:16px!important} /* prevents iOS zoom */
}
</style>
</head>

// ── Intl helpers ───────────────────────────────────
function ianaOffset(iana){
  try{
    const fmt=new Intl.DateTimeFormat('en',{timeZone:iana,timeZoneName:'shortOffset'});
    const str=fmt.formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value||'UTC+0';
    const m=str.match(/UTC([+-])(\d{1,2})(?::(\d{2}))?/);
    if(!m)return 0;
    return(m[1]==='+'?1:-1)*(parseInt(m[2])*60+(parseInt(m[3]||'0')));
  }catch{return 0;}
}
function ianaAbbr(iana){
  try{
    const fmt=new Intl.DateTimeFormat('en',{timeZone:iana,timeZoneName:'short'});
    return fmt.formatToParts(new Date()).find(p=>p.type==='timeZoneName')?.value||iana;
  }catch{return iana;}
}
function fmtOffset(mins){
  const s=mins>=0?'+':'-',a=Math.abs(mins),h=Math.floor(a/60),m=a%60;
  return 'UTC'+s+h+(m?':'+String(m).padStart(2,'0'):'');
}

function randId(n=8){return Math.random().toString(36).slice(2,2+n);}
function displayName(name,slot,i){
  if(name&&name.trim())return name.trim();
  if(slot&&slot.trim()){const tz=slot.trim().split(/\s+/).pop().toUpperCase();if(TZ[tz]!==undefined)return tz;}
  return 'Person '+(i+1);
}
function parseTime(s){
  s=s.trim().toLowerCase();let h,m=0,match;
  if((match=s.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm)$/))){
    h=+match[1];m=match[2]?+match[2]:0;
    if(match[3]==='pm'&&h!==12)h+=12;
    if(match[3]==='am'&&h===12)h=0;
  }else if((match=s.match(/^(\d{1,2}):(\d{2})$/))){h=+match[1];m=+match[2];}
  else return null;
  return h*60+m;
}
function parseInput(raw){
  raw=raw.trim();
  const parts=raw.split(/\s+/);if(parts.length<2)return null;
  const tzStr=parts[parts.length-1].toUpperCase();
  const offset=TZ[tzStr];
  if(offset===undefined)return{error:'Unknown timezone "'+tzStr+'" — use the 🌐 picker or a standard abbreviation like IST, EST, CET'};
  const range=parts.slice(0,-1).join(' ');
  const idx=range.search(/[-\u2013\u2014]/);if(idx<0)return null;
  const sL=parseTime(range.slice(0,idx).trim());
  const eL=parseTime(range.slice(idx+1).trim());
  if(sL===null||eL===null)return null;
  return{tzStr,offset,startLocal:sL,endLocal:eL,startUTC:sL-offset,endUTC:eL-offset};
}
function fmt(m){
  m=((m%1440)+1440)%1440;
  const h=Math.floor(m/60),mn=m%60,ap=h>=12?'pm':'am',h12=h%12||12;
  return mn?h12+':'+String(mn).padStart(2,'0')+ap:h12+ap;
}
function loc(utc,off){return((utc+off)+4320)%1440;}
function midpoint(s,e,dur){return Math.max(s,Math.min(Math.round((s+Math.floor((e-s-dur)/2))/15)*15,e-dur));}
function inconvenience(ss,se,ws,we){
  if(ss>=ws&&se<=we)return 0;if(se<=ws)return ws-se;if(ss>=we)return ss-we;return 0;
}
function findCompromise(people,dur){
  const sweepStart=Math.min(...people.map(p=>p.startUTC));
  const sweepEnd=Math.max(...people.map(p=>p.endUTC));
  let best=null,bs=Infinity;
  for(let s=sweepStart;s<=sweepEnd;s+=15){
    const sc=people.map(p=>inconvenience(s,s+dur,p.startUTC,p.endUTC));
    const tot=sc.reduce((a,b)=>a+b,0),mx=Math.max(...sc);
    const comfortable=sc.filter(v=>v===0).length;
    const score=-comfortable*1000000+tot*1000+mx;
    if(score<bs){bs=score;best={slotStart:s,slotEnd:s+dur,scores:sc,total:tot,maxInc:mx,comfortable};}
  }
  return best;
}
function stddev(arr){
  const m=arr.reduce((a,b)=>a+b,0)/arr.length;
  return Math.sqrt(arr.map(x=>(x-m)**2).reduce((a,b)=>a+b,0)/arr.length);
}
function copyText(btn,text){
  const done=()=>{const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>{btn.textContent=o;},2000);};
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  else fallbackCopy(text,done);
}
function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);cb();
}

// ── Result builder ─────────────────────────────────
function buildResult(people,dur){
  const oS=Math.max(...people.map(p=>((p.startUTC%1440)+1440)%1440));
  const oE=Math.min(...people.map(p=>((p.endUTC%1440)+1440)%1440));
  const hasOverlap=oE>oS&&(oE-oS)>=dur;
  const comp=hasOverlap?{slotStart:oS,slotEnd:oE,scores:people.map(()=>0),total:0,maxInc:0,comfortable:people.length}:findCompromise(people,dur);
  const sugStart=hasOverlap?midpoint(oS,oE,dur):comp.slotStart;
  const sugEnd=sugStart+dur;
  let html='<div class="res-card">';
  if(hasOverlap){
    html+='<span class="badge b-ok">✓ everyone\'s free</span>';
    html+='<div class="big-time">'+fmt(oS)+' – '+fmt(oE)+'</div>';
    html+='<div class="sub-time">'+(oE-oS)+' min overlap window · UTC</div>';
  }else{
    html+='<span class="badge b-comp">~ no overlap — best compromise shown</span>';
    const cn=people.filter((_,i)=>comp.scores[i]===0).map(p=>p.name);
    html+='<div class="no-overlap-notice"><strong>No overlapping free time found.</strong> '+(cn.length>0?'This slot works within '+cn.join(' & ')+'\'s window — others stretch slightly.':'Everyone needs to stretch slightly for this slot.')+' Confirm with your group before booking.</div>';
    html+='<div class="big-time">'+fmt(comp.slotStart)+' – '+fmt(comp.slotEnd)+'</div>';
    html+='<div class="sub-time">'+dur+' min slot · UTC</div>';
  }
  html+='<div class="divider"></div><div class="sec-title">suggested meeting time</div>';
  html+='<div class="suggest-box"><div class="suggest-eyebrow">'+(hasOverlap?'midpoint of overlap':'least inconvenient slot')+'</div>';
  html+='<div class="suggest-time">'+fmt(sugStart)+' – '+fmt(sugEnd)+' <span style="font-size:16px;font-weight:400;color:#854F0B">UTC</span></div>';
  html+='<div class="suggest-utc">'+dur+' min · centred in available window</div>';
  html+='<div class="suggest-list">';
  people.forEach((p,i)=>{
    const color=PALETTE[(p.idx!==undefined?p.idx:i)%PALETTE.length];
    html+='<div class="suggest-row"><div class="dot" style="background:'+color+';flex-shrink:0"></div><span class="suggest-name">'+p.name+'</span><span class="suggest-tz">'+p.tzStr+'</span><span class="suggest-local">'+fmt(loc(sugStart,p.offset))+' – '+fmt(loc(sugEnd,p.offset))+'</span></div>';
  });
  html+='</div></div>';
  if(!hasOverlap&&comp.total>0){
    html+='<div class="divider"></div><div class="sec-title">how far outside each person\'s window</div><div class="pp-list">';
    people.forEach((p,i)=>{
      const inc=comp.scores[i],color=PALETTE[(p.idx!==undefined?p.idx:i)%PALETTE.length];
      html+='<div class="pp"><div class="dot" style="background:'+color+'"></div><span class="pp-label">'+p.name+' <span style="font-weight:400;color:#aaa;font-size:12px">'+p.tzStr+'</span></span><span class="pp-t">'+fmt(loc(sugStart,p.offset))+' – '+fmt(loc(sugEnd,p.offset))+'</span><span class="st '+(inc?'s-warn':'s-ok')+'">'+(inc?'+'+inc+'m stretch':'in range')+'</span></div>';
    });
    html+='</div>';
    const fp=Math.round(Math.max(0,1-(stddev(comp.scores)/(comp.maxInc||1)))*100);
    html+='<div style="margin-top:1rem"><div class="sec-title">fairness</div><div class="fair-track"><div class="fair-fill" style="width:'+fp+'%"></div></div><div class="fair-meta"><span>uneven</span><span>'+fp+'% evenly shared</span><span>equal</span></div></div>';
  }
  const lines=['CommonSlot — suggested meeting time',''];
  if(!hasOverlap)lines.push('⚠ No overlap found — least inconvenient slot','');
  lines.push('UTC: '+fmt(sugStart)+' – '+fmt(sugEnd),'');
  people.forEach(p=>lines.push(p.name+' ('+p.tzStr+'): '+fmt(loc(sugStart,p.offset))+' – '+fmt(loc(sugEnd,p.offset))));
  html+='<button class="copy-btn" id="copybtn">📋 Copy suggested time</button></div>';
  return{html,summary:lines.join('\n')};
}

  document.querySelectorAll('.p-row').forEach((row,i)=>{const dot=row.querySelector('.dot');if(dot)dot.style.background=PALETTE[i%PALETTE.length];});
  updateCountBadge();
}

// ── Session History helpers ─────────────────────────
const HIST_KEY='commonslot_history';
function getHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch{return[];}}
function saveToHistory(sessionId,participants,dur){
  const hist=getHistory().filter(h=>h.id!==sessionId);
  const names=participants.filter(p=>p.name).map(p=>p.name).join(', ')||'Unnamed session';
  hist.unshift({id:sessionId,label:names,dur,date:new Date().toISOString(),link:window.location.href.split('?')[0]+'?s='+sessionId+'&org=1'});
  localStorage.setItem(HIST_KEY,JSON.stringify(hist.slice(0,10)));
}
function clearHistory(){localStorage.removeItem(HIST_KEY);}

function renderHistoryPanel(){
  const hist=getHistory();
  if(!hist.length)return'';
  const items=hist.map(h=>{
    const d=new Date(h.date);
    const ago=formatAgo(d);
    return`<div class="hist-item" onclick="resumeSession('${h.id}')">
      <div class="hist-dot"></div>
      <div class="hist-info">
        <div class="hist-name">${h.label}</div>
        <div class="hist-meta">${h.dur} min · ${ago}</div>
      </div>
      <span class="hist-arrow">›</span>
    </div>`;
  }).join('');
  return`<div class="hist-section">
    <div class="hist-header">
      <span class="hist-title">📋 Previous sessions</span>
      <button class="hist-clear" onclick="clearHistory();renderOrganiser()">Clear</button>
    </div>
    <div class="hist-list">${items}</div>
  </div>`;
}

function formatAgo(d){
  const diff=Date.now()-d.getTime();
  const mins=Math.floor(diff/60000),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
  if(mins<2)return'just now';if(mins<60)return mins+'m ago';if(hrs<24)return hrs+'h ago';
  if(days===1)return'yesterday';if(days<7)return days+'d ago';
  return d.toLocaleDateString();
}

async function orgCreate(){
  const pRows=document.querySelectorAll('.p-row');
  const dur=parseInt(document.getElementById('duration').value);
  const participants=[],people=[],errors=[];
  pRows.forEach((row,i)=>{
    const name=row.querySelector('.p-name').value.trim();
    const v=row.querySelector('.slot-wrap input').value.trim();
    const label=displayName(name,v,i);
    if(!v){errors.push(label+': empty input');return;}
    const p=parseInput(v);
    if(!p||p.error){errors.push(label+': '+(p&&p.error?p.error:'couldn\'t parse "'+v+'"'));return;}
    participants.push({idx:i,name:name||null,slot:v});
    people.push(Object.assign({},p,{idx:i,name:label}));
  });
  const el=document.getElementById('result');
  if(errors.length){el.innerHTML='<div class="res-card"><div class="err-msg">'+errors.map(e=>'⚠ '+e).join('<br>')+'</div></div>';return;}
  if(people.length<2){el.innerHTML='<div class="res-card"><div class="err-msg">Add at least 2 people.</div></div>';return;}
  const btn=document.getElementById('findBtn');
  btn.disabled=true;btn.textContent='Creating session…';
  const sessionId=randId(8);
  const{error:sessErr}=await sb.from('sessions').insert({id:sessionId,duration:dur,participants});
  if(sessErr){
    btn.disabled=false;btn.textContent='Find our slot';
    el.innerHTML='<div class="res-card"><div class="err-msg">⚠ Could not create session: '+sessErr.message+'</div></div>';
    return;
  }
  // Save organiser's slots immediately
  const prefilled=participants.filter(p=>p.slot);
  if(prefilled.length){
    await sb.from('responses').upsert(prefilled.map(p=>({session_id:sessionId,participant_idx:p.idx,name:p.name,slot:p.slot})),{onConflict:'session_id,participant_idx'});
  }
  btn.disabled=false;btn.textContent='Find our slot';
  const orgLink=window.location.href.split('?')[0]+'?s='+sessionId+'&org=1';
  setParam('s',sessionId);setParam('org','1');
  saveToHistory(sessionId,participants,dur);
  await orgShowSession(sessionId,participants,dur,people);
}

async function orgShowSession(sessionId,participants,dur,initialPeople){
  const{data:resps}=await sb.from('responses').select('*').eq('session_id',sessionId);
  const rMap={};(resps||[]).forEach(r=>{rMap[r.participant_idx]=r;});
  const sessionLink=makeInviteLink(sessionId);

  function buildPanel(){
    const responded=Object.keys(rMap).length;
    const panel=document.getElementById('sharePanel');
    panel.style.display='block';
    panel.innerHTML=`
      <button class="new-meeting-btn" onclick="newMeeting()">＋ New meeting schedule</button>
      <div class="share-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.25rem">
          <div class="share-title">🔗 Share with your group</div>
          <span style="font-size:12px;color:#1D9E75"><span class="live-dot"></span>live</span>
        </div>
        <div class="share-sub">Everyone opens this one link, enters their time, and you see it appear here instantly.</div>
        <div class="share-link-row">
          <div class="share-link-box">${sessionLink}</div>
          <button class="share-copy" id="copySessionLink">Copy link</button>
        </div>
        <div class="sec-title" style="margin-top:1rem;margin-bottom:.5rem">${responded} responded</div>
        <div class="status-list">
          ${responded===0?'<div style="font-size:13px;color:#aaa;padding:8px 0">No one has joined yet. Share the link above!</div>':
            Object.values(rMap).map((r,i)=>{
              const label=displayName(r.name,r.slot,r.participant_idx);
              return'<div class="status-row" id="sr_'+r.participant_idx+'">'
                +'<div class="dot" style="background:'+PALETTE[r.participant_idx%PALETTE.length]+'"></div>'
                +'<span class="status-name">'+label+'</span>'
                +'<span class="status-slot">'+r.slot+'</span><span class="s-tag s-done">✓</span>'
                +'</div>';
            }).join('')}
        </div>
      </div>
    `;
    document.getElementById('copySessionLink').addEventListener('click',function(){copyText(this,sessionLink);});
  }

  function recalc(){
    const people=Object.values(rMap).map(r=>{
      const p=parseInput(r.slot);if(!p||p.error)return null;
      return Object.assign({},p,{idx:r.participant_idx,name:displayName(r.name,r.slot,r.participant_idx)});
    }).filter(Boolean);
    if(people.length>=2){
      const{html,summary}=buildResult(people,dur);
      document.getElementById('result').innerHTML=html;
      document.getElementById('copybtn').addEventListener('click',function(){copyText(this,summary);});
    }
  }

  buildPanel();
  // Show result with whatever slots we already have
  if(initialPeople&&initialPeople.length>=2){
    const{html,summary}=buildResult(initialPeople,dur);
    document.getElementById('result').innerHTML=html;
    document.getElementById('copybtn').addEventListener('click',function(){copyText(this,summary);});
  }
  recalc();

  // Real-time subscription
  if(realtimeChannel)sb.removeChannel(realtimeChannel);
  realtimeChannel=sb.channel('org_'+sessionId)
    .on('postgres_changes',{event:'*',schema:'public',table:'responses',filter:'session_id=eq.'+sessionId},payload=>{
      rMap[payload.new.participant_idx]=payload.new;
      buildPanel();recalc();
    }).subscribe();
}

// ── Participant view ────────────────────────────────
async function renderParticipant(sessionId,participantIdx,urlName){

  if(error||!session){
    app.innerHTML='<div class="wrap"><div class="hero"><div class="wordmark">Common<span>Slot</span></div></div><div class="res-card"><div class="err-msg">⚠ Session not found or expired.</div></div></div>';
    return;
  }
  const participants=session.participants||[];
  const dur=session.duration;
  const greeting=urlName||participants[participantIdx]?.name||null;
  const{data:existing}=await sb.from('responses').select('*').eq('session_id',sessionId).eq('participant_idx',participantIdx).maybeSingle();
  const{data:allResps}=await sb.from('responses').select('*').eq('session_id',sessionId);
  const rMap={};(allResps||[]).forEach(r=>{rMap[r.participant_idx]=r;});

  function render(){
    app.innerHTML=`
      <div class="wrap">
        <div class="hero"><div class="wordmark">Common<span>Slot</span></div><div class="tagline">No more timezone gymnastics, Just the time that works for everyone.</div></div>
        <div class="invite-banner">
          <div class="invite-from">you've been invited to find a meeting time</div>
          <div class="invite-greeting">Hey${greeting?', '+greeting:''}! 👋</div>
          <div class="invite-msg">Enter your availability — it syncs to everyone instantly.</div>
        </div>
        <div class="card">
          <label class="field-label">Your time window</label>
          <input class="field-input" id="mySlot" type="text" value="${existing?existing.slot:''}" placeholder="e.g. 2pm-8pm IST">
          ${!greeting?'<label class="field-label">Your name <span style="text-transform:none;font-weight:400;color:#bbb">(optional)</span></label><input class="field-input" id="myName" type="text" placeholder="e.g. Priya">':'<input type="hidden" id="myName" value="'+(greeting||'')+'">'}
          <button class="go" id="submitBtn" onclick="participantSubmit('${sessionId}',${participantIdx},${dur})">${existing?'Update availability':'Submit availability'}</button>
          <div class="hint" style="margin-top:.65rem">Format: <code>2pm-8pm IST</code> or <code>14:00-18:00 CET</code> &nbsp;·&nbsp; or use 🌐 below</div>
        </div>
        <div id="submitMsg"></div>
        ${participants.length>1?`
        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
            <div class="sec-title" style="margin-bottom:0">others in this session</div>
            <span style="font-size:12px;color:#1D9E75"><span class="live-dot"></span>live</span>
          </div>
          <div class="others-list" id="othersList">
            ${participants.map((p,i)=>{
              const isMe=i===participantIdx,r=rMap[i];
              const label=displayName(p.name,null,i);
              const cls=isMe?'ot-you':(r?'ot-done':'ot-wait');
              const txt=isMe?'you':(r?'✓':'waiting');
              return'<div class="others-row" id="or_'+i+'"><div class="dot" style="background:'+PALETTE[i%PALETTE.length]+'"></div><span class="others-name">'+label+(isMe?' (you)':'')+'</span><span class="others-tag '+cls+'">'+txt+'</span></div>';
            }).join('')}
          </div>
        </div>`:''}
      </div>
    `;
    // Wire up globe button for participant slot input
    const slotInp=document.getElementById('mySlot');
    const globeBtn=document.createElement('button');
    globeBtn.className='tz-btn';globeBtn.type='button';globeBtn.innerHTML='🌐';
    globeBtn.style.cssText='margin-top:-.5rem;margin-bottom:1rem';
    globeBtn.addEventListener('click',function(e){e.stopPropagation();openTzDropdown(globeBtn,slotInp);});
    slotInp.parentNode.insertBefore(globeBtn,slotInp.nextSibling);
  }

  render();

  sb.channel('part_'+sessionId+'_'+participantIdx)
    .on('postgres_changes',{event:'*',schema:'public',table:'responses',filter:'session_id=eq.'+sessionId},payload=>{
      const r=payload.new;
      rMap[r.participant_idx]=r;
      if(r.participant_idx!==participantIdx){
        const row=document.getElementById('or_'+r.participant_idx);
        if(row){const t=row.querySelector('.others-tag');if(t){t.className='others-tag ot-done';t.textContent='✓';}}
      }
    }).subscribe();
}

async function participantSubmit(sessionId,participantIdx,dur){
  const slot=document.getElementById('mySlot').value.trim();
  const nameEl=document.getElementById('myName');
  const rawName=nameEl?nameEl.value.trim():'';
  if(!slot){alert('Please enter your availability.');return;}
  const p=parseInput(slot);
  if(!p){alert('Couldn\'t parse that. Try: 2pm-8pm IST');return;}
  if(p.error){alert(p.error);return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='Saving…';
  const{error}=await sb.from('responses').upsert({session_id:sessionId,participant_idx:participantIdx,name:rawName||null,slot},{onConflict:'session_id,participant_idx'});
  btn.disabled=false;btn.textContent='Update availability';
  if(error){document.getElementById('submitMsg').innerHTML='<div class="res-card"><div class="err-msg">⚠ '+error.message+'</div></div>';return;}
  const myRow=document.getElementById('or_'+participantIdx);
  if(myRow){const t=myRow.querySelector('.others-tag');if(t){t.className='others-tag ot-done';t.textContent='✓';}}
  document.getElementById('submitMsg').innerHTML=`
    <div class="success-box">
      <div class="success-title">✓ Submitted!</div>
      <div class="success-msg">The organiser can see your availability now. You can update it above anytime.</div>
      <div class="success-slot">${slot}</div>
    </div>
  `;
}

// ── Returning organiser ─────────────────────────────
async function resumeSession(sessionId){
  const{data:session}=await sb.from('sessions').select('*').eq('id',sessionId).single();
  if(!session){renderOrganiser();return;}
  renderOrganiser();
  saveToHistory(sessionId,session.participants,session.duration);
  setParam('s',sessionId);setParam('org','1');
  await orgShowSession(sessionId,session.participants,session.duration,null);
}

// ── Join view (open link as a new participant) ──────
async function renderJoin(sessionId){
  const app=document.getElementById('app');
  app.innerHTML='<div class="wrap" style="text-align:center;padding:4rem 1rem;color:#aaa">Loading…</div>';
  const{data:session,error}=await sb.from('sessions').select('*').eq('id',sessionId).single();
  if(error||!session){
    app.innerHTML='<div class="wrap"><div class="hero"><div class="wordmark">Common<span>Slot</span></div></div><div class="res-card"><div class="err-msg">⚠ Session not found or expired.</div></div></div>';
    return;
  }
  const dur=session.duration;
  // Get all existing responses to show who's already in
  const{data:allResps}=await sb.from('responses').select('*').eq('session_id',sessionId);
  const existing=allResps||[];
  // The new participant's idx = next available
  let myIdx=existing.length>0?Math.max(...existing.map(r=>r.participant_idx))+1:0;

  function render(resps){
    const whoJoined=resps.map((r,i)=>displayName(r.name,r.slot,r.participant_idx));
    app.innerHTML=`
      <div class="wrap">
        <div class="hero">
          <div class="wordmark">Common<span>Slot</span></div>
          <div class="tagline">No more timezone gymnastics, Just the time that works for everyone.</div>
        </div>
        <div class="join-banner">
          <div class="join-icon">🗓️</div>
          <div class="join-title">You've been invited!</div>
          <div class="join-sub">Enter your availability to find a time that works for the group.</div>
          ${whoJoined.length>0?`<div class="join-who">${whoJoined.map(n=>'<span class="join-who-pill">'+n+' ✓</span>').join('')}</div>`:''}
          <div class="join-dur">Meeting duration: <strong>${dur} min</strong></div>
        </div>
        <div class="card">
          <label class="field-label">Your name <span style="text-transform:none;font-weight:400;color:#bbb">(optional)</span></label>
          <input class="field-input" id="joinName" type="text" placeholder="e.g. Priya">
          <label class="field-label">Your time window</label>
          <input class="field-input" id="joinSlot" type="text" placeholder="e.g. 2pm-8pm IST">
          <button class="go" id="joinBtn">Add my availability</button>
          <div class="hint" style="margin-top:.65rem">Format: <code>2pm-8pm IST</code> &nbsp;·&nbsp; <code>14:00-18:00 CET</code> &nbsp;·&nbsp; or use 🌐 to pick a city</div>
        </div>
        <div id="joinMsg"></div>
        <div style="text-align:center;margin-top:.5rem">
          <a href="?s=${sessionId}&org=1" style="font-size:12px;color:#aaa;text-decoration:none;border-bottom:1px dashed #d6cfc3">Are you the organiser? View your session →</a>
        </div>
      </div>
    `;
    // Wire up globe button
    const slotInp=document.getElementById('joinSlot');
    const globeBtn=document.createElement('button');
    globeBtn.className='tz-btn';globeBtn.type='button';globeBtn.innerHTML='🌐';
    globeBtn.style.cssText='margin-top:-.5rem;margin-bottom:1rem';
    globeBtn.addEventListener('click',function(e){e.stopPropagation();openTzDropdown(globeBtn,slotInp);});
    slotInp.parentNode.insertBefore(globeBtn,slotInp.nextSibling);
    document.getElementById('joinBtn').addEventListener('click',()=>joinSubmit(sessionId,myIdx,dur));
  }

  render(existing);

  // Real-time: update the "who's in" pills as others join
  sb.channel('join_'+sessionId)
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'responses',filter:'session_id=eq.'+sessionId},payload=>{
      existing.push(payload.new);
      // Only re-render the banner pills if the join form hasn't been submitted yet
      const banner=document.querySelector('.join-who');
      if(banner){
        const whoJoined=existing.map(r=>displayName(r.name,r.slot,r.participant_idx));
        banner.innerHTML=whoJoined.map(n=>'<span class="join-who-pill">'+n+' ✓</span>').join('');
      }
    }).subscribe();
}

async function joinSubmit(sessionId,myIdx,dur){
  const slot=document.getElementById('joinSlot').value.trim();
  const name=document.getElementById('joinName').value.trim();
  if(!slot){alert('Please enter your availability.');return;}
  const p=parseInput(slot);
  if(!p){alert('Couldn\'t parse that. Try: 2pm-8pm IST');return;}
  if(p.error){alert(p.error);return;}
  const btn=document.getElementById('joinBtn');
  btn.disabled=true;btn.textContent='Adding you…';
  const{error}=await sb.from('responses').insert({session_id:sessionId,participant_idx:myIdx,name:name||null,slot});
  if(error){
    btn.disabled=false;btn.textContent='Add my availability';
    document.getElementById('joinMsg').innerHTML='<div class="res-card"><div class="err-msg">⚠ '+error.message+'</div></div>';
    return;
  }
  document.getElementById('joinMsg').innerHTML=`
    <div class="success-box">
      <div class="success-title">✓ You're in!</div>
      <div class="success-msg">The organiser can see your availability now. The group result will update automatically.</div>
      <div class="success-slot">${slot}</div>
    </div>
  `;
  btn.disabled=true;btn.textContent='Availability added ✓';
  btn.style.background='#1D9E75';
}

// ── Boot ────────────────────────────────────────────
(async function(){
  const{session,idx,name,org}=getParams();
  if(session&&idx!==null){
    // Legacy per-person link (i= param) — still works
    await renderParticipant(session,parseInt(idx),name?decodeURIComponent(name):null);
  }else if(session&&org==='1'){
    // Organiser returning to their session
    await resumeSession(session);
  }else if(session){
    // Anyone else opening the shared link → join view
    await renderJoin(session);
  }else{
    renderOrganiser();
  }
})();
</script>
